echo "\n###################################### STARTING to READ server.cfg"

hostname "Snake"
rcon_password Batata@22

// This states how players should contact you
sv_contact lucasluzdev@gmail.com

// # of rounds to play (versus)
mp_roundlimit 2

// Use a search key to find the server in the lobby
sv_search_key "Hidden"
sv_tags "Hidden"

// CHEAT/CONFIG
sv_lan 0
sv_cheats 0

motd_enabled            "1"
motdfile "mymotd.txt"                    // This ensures that Valve doesn't overwrite the MoTD every Update.
hostfile "myhost.txt"                    // This ensures that Valve doesn't overwrite the Hostfile every Update.

//GAME MODE
sv_gametypes "versus"
sm_cvar mp_gamemode versus


//Game Settings
                                        
mp_disable_autokick 1         //(command)prevents a userid from being auto-kicked (Usage mp_diable_autokick )
sv_allow_wait_command 0        //default 1; Allow or disalow the wait command on clients connected to this server.
sv_alternateticks 0        //defulat 0; (singleplayer)If set, server only simulates entities on even numbered ticks.
sv_clearhinthistory 0        //(command)Clear memory of server side hint displayed to the player.
sv_consistency 1        //default 1; Whether the server enforces file consistency for critical files
sv_pausable 0            //default 0; is the server pausable
sv_forcepreload 1        //default 0; Force server side preloading
sv_pure_kick_clients 1        //default 1; If set to 1, the server will kick clients with mismatchng files. Otherwise, it will issue a warning to the client.
sv_pure 0            //If set to 1, server will force all client files execpt whitelisted ones (in pure_server_whitelist.txt) to match server's files.
                //If set to 2, the server will force all clietn files to come from steam and not load pure_server_whilelist.txt. Set to 0 for disabled.

// Communication

sv_voiceenable 1    //default 1; enable/disable voice comm
sv_alltalk 0              //default 0; Players can hear all other players' voice communication, no team restrictions

// Logging
log on               //Creates a logfile (on | off)
sv_logecho 0    //default 0; Echo log information to the console.
sv_logfile 1       //default 1; Log server information in the log file.
sv_log_onefile 0    //default 0; Log server information to only one file.
sv_logbans 1         //default 0;Log server bans in the server logs.
sv_logflush 0         //default 0; Flush the log files to disk on each write (slow).
sv_logsdir logs      //Folder in the game directory where server logs will be stored.

// Bans
//  execute banned.cfgs at server start. Optimally at launch commandline.
exec banned_user.cfg  //loads banned users' ids
exec banned_ip.cfg      //loads banned users' ips
writeip          // Save the ban list to banned_ip.cfg.
writeid          // Wrties a list of permanently-banned user IDs to banned_user.cfg.

//Network Tweaks - Increase network performance

//--> Server Rates 30-tick
sv_maxcmdrate 101
sv_minrate 30000                         // Should never change this.
sv_maxrate 30000                        // Set Value to: Tickrate * 1000
sv_mincmdrate 30                            // Should never change this.
sv_maxcmdrate 30                         // Set Value to Tickrate.
net_splitpacket_maxrate 15000       // Set Value to: (Tickrate / 2) * 1000
sm_cvar nb_update_frequency 0.033

// custom config (added by me)

sv_region 2

sm_cvar vs_max_team_switches 99

sm_cvar z_ghost_delay_max 22
sm_cvar z_ghost_delay_min 18

z_difficulty "Impossible"

sv_rcon_minfailures "3" //ban who tries to log in server
sv_rcon_maxfailures "3" //ban who tries to log in server
sv_rcon_banpenalty "720" //Number of minutes to ban users who fail rcon authentication

sm_cvar sm_tankhp_announce 1
sm_cvar sm_tankhp_gaugetype 1

sm_cvar z_tank_health 5334


// l4dtoolz

sv_maxplayers 16
sv_visiblemaxplayers 16
sv_force_unreserved 0

sm_cvar precache_all_survivors 1 // 1=Precache/Load all models of survivors to prevent crash

sm_cvar survivor_limit 4
sm_cvar z_max_player_zombies 4

sv_steamgroup 46108196
sv_steamgroup_exclusive 0

sm_cvar tank_burn_duration 100

// L4D2 competitive rework

sm_cvar mv_maxplayers 16

sm_cvar mp_autoteambalance 0
sm_cvar sv_unlag_fixstuck 1
sm_cvar z_brawl_chance 0
sm_cvar sv_maxunlag 1
sm_cvar sv_forcepreload 1
sm_cvar sv_client_predict 1
sm_cvar sv_client_cmdrate_difference 0
sm_cvar sv_max_queries_sec_global 10
sm_cvar sv_max_queries_sec 3 
sm_cvar sv_max_queries_window 10
sm_cvar sv_player_stuck_tolerance 5
sm_cvar sv_stats 0
sm_cvar sv_clockcorrection_msecs 25


survivor_friendly_fire_factor_easy 0
survivor_friendly_fire_factor_normal 0.1
survivor_friendly_fire_factor_hard 0.3
survivor_friendly_fire_factor_expert 0.5

echo "\n###################################### ENDED READING server.cfg"